services:
  dispatch-central:
    image: ghcr.io/skillcape-software-llc/dispatch-central:latest
    ports:
      - "3001:3001"
    environment:
      - PASSPHRASE=${PASSPHRASE:?PASSPHRASE is required}
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      - PORT=3001
      - DATA_DIR=/data
      - LOG_LEVEL=info
    volumes:
      - central-data:/data
    restart: unless-stopped

volumes:
  central-data:
